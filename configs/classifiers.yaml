# Classifier configuration (Stage D in the staged benchmark).
#
# All classifiers are wrapped in a sigmoid calibration layer fitted only on
# training subjects so that a common mean-probability aggregation rule can be
# applied at the subject level.
shrinkage_lda:
  name: "shrinkage_lda"
  params:
    shrinkage: "auto"

logistic_regression:
  name: "logistic_regression"
  params:
    penalty: "l2"
    max_iter: 5000
    class_weight: "balanced"
    C_grid: [0.01, 0.1, 1.0, 10.0]

linear_svm:
  name: "linear_svm"
  params:
    class_weight: "balanced"
    C_grid: [0.01, 0.1, 1.0, 10.0]

rbf_svm:
  name: "rbf_svm"
  params:
    class_weight: "balanced"
    C_grid: [0.1, 1.0, 10.0, 100.0]
    gamma_grid: ["scale", 0.001, 0.01, 0.1]

knn:
  name: "knn"
  params:
    k_grid: [3, 5, 7, 11]
    weights: "distance"

random_forest:
  name: "random_forest"
  params:
    n_estimators: 500
    max_features: "sqrt"
    class_weight: "balanced"
    min_samples_leaf_grid: [1, 2, 4]

extra_trees:
  name: "extra_trees"
  params:
    n_estimators: 500
    max_features: "sqrt"
    class_weight: "balanced"
    min_samples_leaf_grid: [1, 2, 4]

gradient_boosting:
  name: "gradient_boosting"
  params:
    n_estimators_grid: [100, 300]
    learning_rate_grid: [0.05, 0.1]
    max_depth_grid: [2, 3]
